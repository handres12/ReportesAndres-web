const raw=Uint8Array.from(atob(B64),c=>c.charCodeAt(0));
const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
async function abrir(pass){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:600000,hash:"SHA-256"},
        km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},k,ct);
  const html=new TextDecoder().decode(pt);
  localStorage.setItem("bi_k",pass);
  document.open();document.write(html);document.close();
}
document.getElementById("f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  try{await abrir(document.getElementById("p").value);}
  catch(_){document.getElementById("e").style.display="block";}
});
const g=localStorage.getItem("bi_k");
if(g){abrir(g).catch(()=>localStorage.removeItem("bi_k"));}
